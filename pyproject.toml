[project]
name = "gnosis-template"
version = "0.1.0"
description = ""
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "modal==0.56.1",
    "pydantic==2.12.2",
    "torch==2.8.0",
    "torchvision==0.23.0",
    "transformers==4.57.1",
    "accelerate>=0.20.0",
    "Pillow==10.4.0",
    "google-genai>=1.0.0",
    "huggingface-hub>=0.20.0",
    "dotenv>=0.9.9",
]

[tool.ruff]
line-length = 88
target-version = "py313"
extend-exclude = [
  "data",
  "build/",
  "dist/",
  ".venv/",
  "__pycache__",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

[tool.ruff.lint]
# which rule sets to enable; you can start simple
select = ["E", "F"]  # errors (E) + pyflakes (F)
ignore = []           # none to ignore initially
