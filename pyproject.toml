[project]
name = "gnosis-template"
version = "0.1.0"
description = ""
readme = "README.md"
requires-python = ">=3.13"

[tool.ruff]
line-length = 88
target-version = "py313"
extend-exclude = [
  "data",
  "build/",
  "dist/",
  ".venv/",
  "__pycache__",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

[tool.ruff.lint]
# which rule sets to enable; you can start simple
select = ["E", "F"]  # errors (E) + pyflakes (F)
ignore = []           # none to ignore initially
