[project]
name = "gnosis"
version = "0.1.0"
description = "Image processing utilities"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "accelerate>=1.11.0",
    "bitsandbytes>=0.48.1",
    "grpcio>=1.76.0",
    "grpcio-tools>=1.76.0",
    "huggingface-hub>=0.36.0",
    "modal>=1.2.1",
    "pre-commit>=4.5.0",
    "protobuf>=6.33.0",
    "pydantic>=2.12.3",
    "qwen-vl-utils>=0.0.14",
    "torch>=2.9.0",
    "torchvision>=0.24.0",
    "transformers>=4.57.1",
    "triton>=3.5.0",
]

[tool.ruff]
line-length = 99
target-version = "py313"
extend-exclude = [
  "data",
  "build/",
  "dist/",
  ".venv/",
  "__pycache__",
  "app/gateway/app/gRPC/generated/",
  "app/vlm_server/src/gRPC/generated/"
]

[tool.ruff.lint] 
select = ["E", "F"] 
ignore = ["E501"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

[tool.uv.workspace]
members = [
    "app/eval",
    "app/gateway",
]

[dependency-groups]
dev = [
    "ruff>=0.14.6",
]
