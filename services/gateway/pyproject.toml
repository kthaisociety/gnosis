[project]
name = "gateway"
version = "0.1.0"
description = "Gnosis main API"
requires-python = ">=3.13"
dependencies = [
    "fastapi>=0.124.2",
    "httpx>=0.28.1",
    "lib",
    "modal>=1.2.4",
    "numpy>=2.3.5",
    "opencv-python>=4.11.0.86",
    "python-multipart>=0.0.20",
    "requests>=2.32.5",
    "uvicorn>=0.38.0",
]

[tool.uv.sources]
lib = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["gateway"]
