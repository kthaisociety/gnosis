services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    networks:
      - gnosis-net
    depends_on:
      - gateway
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - SERVER_IP=vlm-server
      - PROD=true
    networks:
      - gnosis-net
    depends_on:
      - vlm-server
    restart: unless-stopped

  vlm-server:
    build:
      context: .
      dockerfile: services/vlm_server/Dockerfile
    ports:
      - "50051:50051"
    environment:
      - GRPC_BIND=0.0.0.0
    networks:
      - gnosis-net
    restart: unless-stopped

networks:
  gnosis-net:
    driver: bridge
